services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - storage_data:/var/www/html/storage/app
    environment:
      - APP_ENV=${APP_ENV:-local}
    networks:
      - medical_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: medical_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www/html
      - storage_data:/var/www/html/storage/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - medical_network
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: medical_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-medical_system}
      POSTGRES_USER: ${DB_USERNAME:-medical_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-medical_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT_EXTERNAL:-5433}:5432"
    networks:
      - medical_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-medical_user} -d ${DB_DATABASE:-medical_system}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: medical_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT_EXTERNAL:-6380}:6379"
    networks:
      - medical_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  storage_data:
    driver: local

networks:
  medical_network:
    driver: bridge
